<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivial Poursuite Bac Pro — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a3a5c;--bg2:#0f2540;--gold:#f0c040;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:24px;}

h1{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--gold);text-align:center;text-shadow:2px 2px 0 rgba(0,0,0,0.4);line-height:1.1;}
h1 span{color:#fff;}

.card{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.13);border-radius:20px;padding:26px;width:100%;max-width:520px;display:flex;flex-direction:column;gap:16px;}

.field label{display:block;color:rgba(255,255,255,0.55);font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.field input{background:rgba(255,255,255,0.09);border:2px solid rgba(255,255,255,0.18);border-radius:10px;color:#fff;font-size:1.1rem;font-weight:700;padding:10px 14px;width:100%;font-family:'Nunito',sans-serif;text-transform:uppercase;}
.field input::placeholder{color:rgba(255,255,255,0.28);text-transform:none;}
.field input:focus{outline:none;border-color:var(--gold);}

.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.team-btn{border-radius:14px;padding:18px 12px;text-align:center;cursor:pointer;border:3px solid transparent;background:rgba(255,255,255,0.06);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.team-btn:hover{transform:translateY(-2px);filter:brightness(1.15);}
.team-btn.selected{border-color:#fff;background:rgba(255,255,255,0.15);transform:translateY(-2px);}
.team-btn.disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}
.team-num{font-family:'Fredoka One',cursive;font-size:1.6rem;}
.team-label{font-size:0.8rem;font-weight:800;color:#fff;}
.team-type{font-size:0.7rem;color:rgba(255,255,255,0.5);}

.btn-go{background:linear-gradient(135deg,#f0c040,#e09020);color:#111;border:none;border-radius:14px;padding:15px;font-size:1.1rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(240,192,64,0.35);width:100%;}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(240,192,64,0.5);}
.btn-go:disabled{background:#3a3a3a;color:#666;cursor:not-allowed;transform:none;box-shadow:none;}

.info{color:rgba(255,255,255,0.35);font-size:0.78rem;text-align:center;line-height:1.6;}
.info a{color:rgba(255,255,255,0.55);text-decoration:none;}

/* Statuts équipes */
.status-box{display:none;flex-direction:column;gap:8px;}
.status-box.visible{display:flex;}
.status-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);border-radius:10px;padding:10px 14px;}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.status-name{font-size:0.85rem;font-weight:700;color:#fff;flex:1;}
.status-tag{font-size:0.72rem;font-weight:700;padding:3px 8px;border-radius:6px;}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
</style>
</head>
<body>

<h1>🎓 Trivial Poursuite <span>Bac Pro</span></h1>

<div class="card">
  <div class="field">
    <label>Code de partie</label>
    <input id="code-input" type="text" placeholder="Entrez le code donné par le prof" maxlength="12" oninput="onInput()">
  </div>

  <div class="field">
    <label>Votre équipe</label>
    <div class="teams-grid" id="teams-grid">
      <div class="team-btn" id="tb1" onclick="selectTeam(1)" style="border-left:4px solid #e63946">
        <div class="team-num" style="color:#e63946">1</div>
        <div class="team-label">Équipe 1</div>
        <div class="team-type" id="tt1">—</div>
      </div>
      <div class="team-btn" id="tb2" onclick="selectTeam(2)" style="border-left:4px solid #f4a261">
        <div class="team-num" style="color:#f4a261">2</div>
        <div class="team-label">Équipe 2</div>
        <div class="team-type" id="tt2">—</div>
      </div>
      <div class="team-btn" id="tb3" onclick="selectTeam(3)" style="border-left:4px solid #2a9d8f">
        <div class="team-num" style="color:#2a9d8f">3</div>
        <div class="team-label">Équipe 3</div>
        <div class="team-type" id="tt3">—</div>
      </div>
      <div class="team-btn" id="tb4" onclick="selectTeam(4)" style="border-left:4px solid #8338ec">
        <div class="team-num" style="color:#8338ec">4</div>
        <div class="team-label">Équipe 4</div>
        <div class="team-type" id="tt4">—</div>
      </div>
    </div>
  </div>

  <button class="btn-go" id="btn-go" disabled onclick="joinGame()">Rejoindre la partie →</button>
</div>

<div class="info">
  Le code de partie est affiché par votre professeur.<br>
  Choisissez votre équipe puis cliquez sur "Rejoindre".
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getDatabase,ref,get}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app=initializeApp({
  apiKey:"AIzaSyCvXbl2nz3KAO36yj1q-fcqJ5FxEJG2x6w",
  authDomain:"trivial-poursuite.firebaseapp.com",
  databaseURL:"https://trivial-poursuite-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"trivial-poursuite",
  storageBucket:"trivial-poursuite.firebasestorage.app",
  messagingSenderId:"287506850350",
  appId:"1:287506850350:web:79b90d6beadc3297cbb5bf"
});
const db=getDatabase(app);

const TYPES={player:'Joueur 👤',computer:'Ordi 🤖',null:'Désactivée ✗'};
const TC=['#e63946','#f4a261','#2a9d8f','#8338ec'];

let selectedTeam=null;
let lookupTimeout=null;
let lastCode='';
let gameTeams=null;

window.onInput=function(){
  const code=document.getElementById('code-input').value.trim().toUpperCase();
  if(code===lastCode)return;
  lastCode=code;
  // reset
  selectedTeam=null;gameTeams=null;
  for(let t=1;t<=4;t++){
    document.getElementById(`tt${t}`).textContent='—';
    const btn=document.getElementById(`tb${t}`);
    btn.classList.remove('selected','disabled');
  }
  checkReady();
  if(code.length<3)return;
  clearTimeout(lookupTimeout);
  lookupTimeout=setTimeout(()=>lookupGame(code),600);
};

async function lookupGame(code){
  try{
    const snap=await get(ref(db,`games/${code}`));
    if(!snap.exists()){
      // Partie pas encore créée — afficher équipes neutres
      gameTeams=null;
      for(let t=1;t<=4;t++)document.getElementById(`tt${t}`).textContent='En attente...';
      return;
    }
    const state=snap.val();
    gameTeams=state.teams||{};
    for(let t=1;t<=4;t++){
      const v=gameTeams[t]||null;
      const tag=document.getElementById(`tt${t}`);
      const btn=document.getElementById(`tb${t}`);
      if(v==='player'){tag.textContent='Joueur 👤';btn.classList.remove('disabled');}
      else if(v==='computer'){tag.textContent='Ordi 🤖';btn.classList.add('disabled');}
      else{tag.textContent='Désactivée ✗';btn.classList.add('disabled');}
    }
    checkReady();
  }catch(e){console.error(e);}
}

window.selectTeam=function(t){
  selectedTeam=t;
  for(let i=1;i<=4;i++){
    const btn=document.getElementById(`tb${i}`);
    if(!btn.classList.contains('disabled'))btn.classList.remove('selected');
  }
  document.getElementById(`tb${t}`).classList.add('selected');
  checkReady();
};

function checkReady(){
  const code=document.getElementById('code-input').value.trim();
  document.getElementById('btn-go').disabled=!(code.length>=3&&selectedTeam&&!document.getElementById(`tb${selectedTeam}`)?.classList.contains('disabled'));
}

window.joinGame=function(){
  const code=document.getElementById('code-input').value.trim().toUpperCase();
  // URL du jeu : même dossier, fichier trivial-bac-pro.html
  // base url (inutilisée, redirection directe ci-dessous)
  window.location.href=`trivial-bac-pro.html?code=${code}&team=${selectedTeam}`;
};
</script>
</body>
</html>
